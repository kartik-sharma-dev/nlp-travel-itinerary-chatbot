<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Signup Links</title>

<style>
body{
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    display:flex;
    gap:20px;
}

.btn{
    text-decoration:none;
    padding:12px 28px;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    transition:0.3s ease;
}

.login-btn{
    background:white;
    color:#667eea;
    border:2px solid white;
}

.login-btn:hover{
    background:transparent;
    color:white;
}

.signup-btn{
    background:#ff9800;
    color:white;
    border:2px solid #ff9800;
}

.signup-btn:hover{
    background:transparent;
    color:#ff9800;
}
</style>
</head>
<body>

<div class="container">
    <a href="{% url 'login' %}" class="btn login-btn">Login</a>
    <a href="{% url 'sign_up' %}" class="btn signup-btn">Sign Up</a>
</div>

</body>
</html>
