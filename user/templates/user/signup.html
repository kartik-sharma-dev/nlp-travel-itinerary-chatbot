<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Travel AI</title>

<style>
:root {
    --bg-main: #f8fafc;
    --card-bg: #ffffff;
    --text-dark: #0f172a;
    --text-muted: #64748b;
    --border-color: #e2e8f0;
    
    /* Brand Colors */
    --brand-primary: #0ea5e9;
    --brand-hover: #0284c7;
    --brand-light: #e0f2fe;
    
    /* Validation Colors */
    --success-text: #16a34a;
    --error-text: #dc2626;
    
    --radius-lg: 16px;
    --radius-md: 8px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: var(--bg-main);
    color: var(--text-dark);
    -webkit-font-smoothing: antialiased;
    padding: 20px 0;
}

.container {
    width: 100%;
    max-width: 440px;
    background: var(--card-bg);
    padding: 40px;
    border-radius: var(--radius-lg);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 4px 6px rgba(0, 0, 0, 0.02);
    margin: 20px;
}

.brand-icon {
    width: 48px;
    height: 48px;
    background: var(--brand-light);
    color: var(--brand-primary);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px auto;
}

h2 {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 8px;
}

.subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.95rem;
    margin-bottom: 30px;
}

.input-group {
    margin-bottom: 20px;
}

label {
    display: block;
    margin-bottom: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text-dark);
}

input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    font-size: 1rem;
    color: var(--text-dark);
    transition: all 0.2s ease;
    background: #fff;
}

input:focus {
    outline: none;
    border-color: var(--brand-primary);
    box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
}

/* Date input styling consistency */
input[type="date"] {
    color: var(--text-dark);
    font-family: inherit;
}

.message {
    font-size: 0.85rem;
    margin-top: 8px;
    font-weight: 500;
    min-height: 18px; /* Prevents layout jump when text is added */
}

.success {
    color: var(--success-text);
}

.error {
    color: var(--error-text);
}

.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: var(--radius-md);
    background: var(--brand-primary);
    color: white;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 10px;
}

.btn:hover:not(:disabled) {
    background: var(--brand-hover);
}

.btn:disabled {
    background: #cbd5e1;
    cursor: not-allowed;
    color: #f1f5f9;
}

.login-link {
    text-align: center;
    margin-top: 24px;
    font-size: 0.95rem;
    color: var(--text-muted);
}

.login-link a {
    text-decoration: none;
    color: var(--brand-primary);
    font-weight: 500;
    transition: color 0.2s;
}

.login-link a:hover {
    color: var(--brand-hover);
}
</style>
</head>
<body>

<div class="container">
    <div class="brand-icon">
        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l-8 8m0-8l8 8m-4-10a9 9 0 110 18 9 9 0 010-18z"></path></svg>
    </div>

    <h2>Start Your Journey</h2>
    <p class="subtitle">Create a new Travel AI account</p>

    <form method="POST">
        {% csrf_token %}

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" name="name" required placeholder="John Doe">
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" name="email" required placeholder="john@example.com">
            <div id="emailMessage" class="message"></div>
        </div>

        <div class="input-group">
            <label>Date of Birth</label>
            <input type="date" name="DOB">
        </div>

        <div class="input-group">
            <label>Mobile Number</label>
            <input type="text" name="mobile" placeholder="+1 (555) 000-0000">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
            <div id="passwordMessage" class="message"></div>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirm_password" required placeholder="••••••••">
            <div id="confirmMessage" class="message"></div>
        </div>

        <button type="submit" id="submitBtn" class="btn" disabled>
            Create Account
        </button>

    </form>

    <div class="login-link">
        Already have an account?
        <a href="{% url 'login' %}">Sign In</a>
    </div>

</div>

<script>
const email = document.getElementById("email");
const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirmPassword");
const submitBtn = document.getElementById("submitBtn");

const emailMessage = document.getElementById("emailMessage");
const passwordMessage = document.getElementById("passwordMessage");
const confirmMessage = document.getElementById("confirmMessage");

let emailValid = false;
let passwordValid = false;
let confirmValid = false;

function validateForm(){
    submitBtn.disabled = !(emailValid && passwordValid && confirmValid);
}

email.addEventListener("input", () => {
    if(email.value.includes("@")){
        emailValid = true;
        emailMessage.innerHTML = "✓ Valid Email";
        emailMessage.className = "message success";
    } else {
        emailValid = false;
        emailMessage.innerHTML = "Email must contain @";
        emailMessage.className = "message error";
    }
    validateForm();
});

password.addEventListener("input", () => {
    const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&.#])[A-Za-z\d@$!%*?&.#]{8,}$/;

    if(regex.test(password.value)){
        passwordValid = true;
        passwordMessage.innerHTML = "✓ Strong Password";
        passwordMessage.className = "message success";
    } else {
        passwordValid = false;
        passwordMessage.innerHTML = "Must contain 8+ chars, uppercase, lowercase, number & special character";
        passwordMessage.className = "message error";
    }

    validateConfirmPassword();
    validateForm();
});

confirmPassword.addEventListener("input", () => {
    validateConfirmPassword();
    validateForm();
});

function validateConfirmPassword(){
    if(password.value === confirmPassword.value && confirmPassword.value !== ""){
        confirmValid = true;
        confirmMessage.innerHTML = "✓ Passwords Match";
        confirmMessage.className = "message success";
    } else {
        confirmValid = false;
        confirmMessage.innerHTML = "Passwords do not match";
        confirmMessage.className = "message error";
    }
}
</script>

</body>
</html>
