<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:800px;
    height:90vh;
    background:white;
    border-radius:15px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.chat-header{
    background:#667eea;
    color:white;
    padding:18px;
    font-size:20px;
    font-weight:bold;
}

.chat-body{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.message{
    max-width:75%;
    padding:12px;
    border-radius:12px;
    word-wrap:break-word;
}

.user-message{
    align-self:flex-end;
    background:#667eea;
    color:white;
}

.bot-message{
    align-self:flex-start;
    background:#ececec;
    color:black;
}

.chat-footer{
    display:flex;
    gap:10px;
    padding:15px;
    border-top:1px solid #ddd;
}

#messageInput{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
}

#sendBtn{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#667eea;
    color:white;
    cursor:pointer;
}

#sendBtn:hover{
    opacity:0.9;
}

.status{
    padding:8px;
    font-size:12px;
    color:green;
}

</style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        AI Chatbot
    </div>

    <div class="status" id="status">
        Connecting...
    </div>

    <div class="chat-body" id="chatBody">

    </div>

    <div class="chat-footer">

        <input
            type="text"
            id="messageInput"
            placeholder="Type your message..."
        >

        <button id="sendBtn">
            Send
        </button>

    </div>

</div>

<script>

const chatBody = document.getElementById("chatBody");
const messageInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const statusDiv = document.getElementById("status");

/*
Backend websocket URL
Example:
ws://127.0.0.1:8000/ws/chat/
*/

console.log("ws://" + window.location.host + "/ws/chat/")
const socket = new WebSocket('ws://127.0.0.1:8000/ws/chat/');
    
    {% comment %} "ws://" + window.location.host + "/ws/chat/" {% endcomment %}
let currentBotMessage = null;

socket.onopen = function(){

    statusDiv.innerHTML = "Connected";
    statusDiv.style.color = "green";

    console.log("Connected");
};

socket.onclose = function(){

    statusDiv.innerHTML = "Disconnected";
    statusDiv.style.color = "red";

    console.log("Disconnected");
};

socket.onerror = function(error){

    console.log(error);
};

socket.onmessage = function(event){

    const data = JSON.parse(event.data);

    /*
    Expected Backend Response:

    {
        "type":"message",
        "message":"Hello User"
    }

    OR

    {
        "type":"stream",
        "token":"Hel"
    }

    {
        "type":"stream",
        "token":"lo"
    }

    {
        "type":"stream_end"
    }
    */

    if(data.type === "message"){

        addBotMessage(data.message);
    }

    else if(data.type === "stream"){

        streamBotToken(data.token);
    }

    else if(data.type === "stream_end"){

        currentBotMessage = null;
    }
};

function addUserMessage(text){

    const div = document.createElement("div");

    div.classList.add(
        "message",
        "user-message"
    );

    div.innerText = text;

    chatBody.appendChild(div);

    scrollToBottom();
}

function addBotMessage(text){

    const div = document.createElement("div");

    div.classList.add(
        "message",
        "bot-message"
    );

    div.innerText = text;

    chatBody.appendChild(div);

    scrollToBottom();
}

function streamBotToken(token){

    if(!currentBotMessage){

        currentBotMessage =
            document.createElement("div");

        currentBotMessage.classList.add(
            "message",
            "bot-message"
        );

        currentBotMessage.innerText = "";

        chatBody.appendChild(
            currentBotMessage
        );
    }

    currentBotMessage.innerText += token;

    scrollToBottom();
}

function sendMessage(){

    const message =
        messageInput.value.trim();

    if(message === ""){
        return;
    }

    addUserMessage(message);

    socket.send(
        JSON.stringify({

            message: message,

            timestamp:
                new Date().toISOString()

        })
    );

    messageInput.value = "";
}

sendBtn.addEventListener(
    "click",
    sendMessage
);

messageInput.addEventListener(
    "keypress",
    function(e){

        if(e.key === "Enter"){
            sendMessage();
        }
    }
);

function scrollToBottom(){

    chatBody.scrollTop =
        chatBody.scrollHeight;
}

</script>

</body>
</html>
