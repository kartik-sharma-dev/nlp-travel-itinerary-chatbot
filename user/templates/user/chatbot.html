<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    background:#f5f5f5;
    overflow:hidden;
}

.app-container{
    display:flex;
    height:100vh;
}

/* ===========================
   SIDEBAR
=========================== */

.sidebar{
    width:280px;
    background:#202123;
    color:white;
    display:flex;
    flex-direction:column;
}

.sidebar-header{
    padding:15px;
    border-bottom:1px solid #444;
}

.new-chat-btn{
    display:block;
    width:100%;
    padding:12px;
    text-align:center;
    text-decoration:none;
    color:white;
    background:#343541;
    border-radius:8px;
    transition:0.3s;
}

.new-chat-btn:hover{
    background:#444654;
}

.chat-history{
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.history-item{
    display:block;
    padding:12px;
    margin-bottom:8px;
    text-decoration:none;
    color:white;
    background:#343541;
    border-radius:8px;
    transition:0.3s;
}

.history-item:hover{
    background:#444654;
}

.history-item.active{
    background:#667eea;
}

/* ===========================
   CHAT SECTION
=========================== */

.chat-container{
    flex:1;
    display:flex;
    flex-direction:column;
    background:white;
}

.chat-header{
    background:#667eea;
    color:white;
    padding:18px;
    font-size:20px;
    font-weight:bold;
}

.status{
    padding:8px 15px;
    font-size:12px;
    color:green;
    border-bottom:1px solid #ddd;
}

.chat-body{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.message{
    max-width:75%;
    padding:12px 15px;
    border-radius:12px;
    word-wrap:break-word;
    line-height:1.5;
}

.user-message{
    align-self:flex-end;
    background:#667eea;
    color:white;
}

.bot-message{
    align-self:flex-start;
    background:#ececec;
    color:black;
}

.chat-footer{
    display:flex;
    gap:10px;
    padding:15px;
    border-top:1px solid #ddd;
}

#messageInput{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
}

#sendBtn{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#667eea;
    color:white;
    cursor:pointer;
}

#sendBtn:hover{
    opacity:0.9;
}

/* ===========================
   TYPING CURSOR EFFECT
=========================== */

.typing-cursor::after{
    content:"|";
    animation:blink 0.7s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

/* ===========================
   MOBILE
=========================== */

@media(max-width:768px){

    .sidebar{
        width:220px;
    }

    .message{
        max-width:90%;
    }
}

</style>
</head>

<body>

<div class="app-container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="sidebar-header">
            <a href="{% url 'exit_chat' %}" class="new-chat-btn">
                + New Chat
            </a>
        </div>

        <div class="chat-history">

            {% for chat in all_chats %}
                <a href="{% url 'history_based_on_session' chat.chat_id %}"
                   class="history-item {% if current_chat.chat_id == chat.chat_id %}active{% endif %}">
                    {{ chat.chat_title }}
                </a>
            {% empty %}
                <div style="padding:10px;">
                    No chats available
                </div>
            {% endfor %}

        </div>

    </div>

    <!-- CHAT AREA -->
    <div class="chat-container">

        <div class="chat-header">
            {% if current_chat %}
                {{ current_chat.chat_title }}
            {% else %}
                AI Chatbot
            {% endif %}
        </div>

        <div class="status" id="status">
            Connecting...
        </div>

        <div class="chat-body" id="chatBody">

            {% for msg in conversation %}
                <div class="message user-message">
                    {{ msg.user_message }}
                </div>

                <div class="message bot-message">
                    {{ msg.bot_message }}
                </div>
            {% endfor %}

        </div>

        <div class="chat-footer">

            <input type="text" id="messageInput" placeholder="Type your message...">

            <button id="sendBtn">Send</button>

        </div>

    </div>

</div>

<script>

const chatBody = document.getElementById("chatBody");
const messageInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const statusDiv = document.getElementById("status");

const CHAT_ID = "{{ current_chat.chat_id|default:'' }}";
console.log(CHAT_ID)
const socket = new WebSocket(
    "ws://" + window.location.host + "/ws/chat/"
);

socket.onopen = function(){
    statusDiv.innerHTML = "Connected";
    statusDiv.style.color = "green";
};

socket.onclose = function(){
    statusDiv.innerHTML = "Disconnected";
    statusDiv.style.color = "red";
};

socket.onerror = function(error){
    console.log(error);
};

socket.onmessage = function(event){

    const data = JSON.parse(event.data);

    if(data.status === "success"){
        addBotMessage(data.bot_response);
    }
    else if(data.status === "error"){
        addBotMessage("Error: " + data.message);
    }
};

// USER MESSAGE
function addUserMessage(text){

    const div = document.createElement("div");

    div.classList.add("message", "user-message");

    div.innerText = text;

    chatBody.appendChild(div);

    scrollToBottom();
}

// BOT TYPEWRITER EFFECT
function addBotMessage(text){

    const div = document.createElement("div");

    div.classList.add("message", "bot-message", "typing-cursor");

    chatBody.appendChild(div);

    let index = 0;

    function typeWriter(){

        if(index < text.length){

            div.textContent += text.charAt(index);

            index++;

            scrollToBottom();

            setTimeout(typeWriter, 15);

        } else {
            div.classList.remove("typing-cursor");
        }
    }

    typeWriter();
}

// SEND MESSAGE
function sendMessage(){

    const message = messageInput.value.trim();

    if(message === ""){
        return;
    }

    addUserMessage(message);

    socket.send(JSON.stringify({
        message: message,
        chat_id: CHAT_ID
    }));
    console.log(CHAT_ID)
    messageInput.value = "";
}

sendBtn.addEventListener("click", sendMessage);

messageInput.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});

function scrollToBottom(){
    chatBody.scrollTop = chatBody.scrollHeight;
}

scrollToBottom();

</script>

</body>
</html>
